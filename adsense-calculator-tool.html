<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdSense Revenue Calculator</title>

  <!-- Google Fonts & Chart.js -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
      --card-bg: rgba(255, 255, 255, 0.95);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #ec4899;
      --accent: #8b5cf6;
      --success: #10b981;
      --warning: #f59e0b;
      --text-dark: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
      color: var(--text-dark);
    }

    .container {
      width: 100%;
      max-width: 1100px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .calculator-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
    }

    @media (max-width: 900px) {
      .calculator-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Input Section */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .input-group {
      background: #f8fafc;
      border: 1px solid var(--border);
      padding: 1.25rem;
      border-radius: 16px;
      transition: all 0.3s ease;
    }

    .input-group:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
      background: #ffffff;
    }

    .label-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .label-wrapper label {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-dark);
    }

    .input-badge {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.25rem 0.5rem;
    }

    .input-badge span {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .input-badge input[type="number"] {
      border: none;
      outline: none;
      width: 80px;
      text-align: right;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--primary);
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      border-radius: 5px;
      background: #e2e8f0;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
      transition: transform 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    /* Output Section */
    .output-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .revenue-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    @media (max-width: 500px) {
      .revenue-cards {
        grid-template-columns: 1fr;
      }
    }

    .card {
      padding: 1.25rem;
      border-radius: 16px;
      color: #ffffff;
      text-align: center;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: rgba(255, 255, 255, 0.1);
      transform: rotate(45deg);
      pointer-events: none;
    }

    .card.daily { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
    .card.monthly { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
    .card.yearly { background: linear-gradient(135deg, #ec4899, #be185d); }

    .card span {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.9;
      font-weight: 600;
    }

    .card h2 {
      font-size: 1.35rem;
      font-weight: 800;
      margin-top: 0.35rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .stat-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
    }

    .stat-box small {
      color: var(--text-muted);
      font-size: 0.8rem;
      display: block;
      margin-bottom: 0.25rem;
    }

    .stat-box strong {
      font-size: 1.1rem;
      color: var(--text-dark);
    }

    .chart-container {
      position: relative;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>AdSense Revenue Calculator</h1>
      <p>Estimate your potential Google AdSense earnings dynamically</p>
    </header>

    <div class="calculator-grid">
      <!-- Input Controls -->
      <div class="input-section">
        
        <!-- Daily Page Views -->
        <div class="input-group">
          <div class="label-wrapper">
            <label for="pageViews">Daily Page Views</label>
            <div class="input-badge">
              <input type="number" id="pageViewsInput" value="10000" min="100" max="1000000" step="100">
            </div>
          </div>
          <input type="range" id="pageViews" min="100" max="1000000" step="100" value="10000">
        </div>

        <!-- Click-Through Rate (CTR) -->
        <div class="input-group">
          <div class="label-wrapper">
            <label for="ctr">Click-Through Rate (CTR)</label>
            <div class="input-badge">
              <input type="number" id="ctrInput" value="1.5" min="0.1" max="20" step="0.1">
              <span>%</span>
            </div>
          </div>
          <input type="range" id="ctr" min="0.1" max="20" step="0.1" value="1.5">
        </div>

        <!-- Cost Per Click (CPC) -->
        <div class="input-group">
          <div class="label-wrapper">
            <label for="cpc">Cost Per Click (CPC)</label>
            <div class="input-badge">
              <span>$</span>
              <input type="number" id="cpcInput" value="0.25" min="0.01" max="10" step="0.01">
            </div>
          </div>
          <input type="range" id="cpc" min="0.01" max="10" step="0.01" value="0.25">
        </div>

        <!-- Metrics Overview -->
        <div class="stats-grid">
          <div class="stat-box">
            <small>Daily Clicks</small>
            <strong id="dailyClicks">0</strong>
          </div>
          <div class="stat-box">
            <small>Estimated eCPM</small>
            <strong id="ecpm">$0.00</strong>
          </div>
        </div>

      </div>

      <!-- Output Section -->
      <div class="output-section">
        
        <!-- Revenue Display Cards -->
        <div class="revenue-cards">
          <div class="card daily">
            <span>Daily</span>
            <h2 id="dailyEarn">$0.00</h2>
          </div>
          <div class="card monthly">
            <span>Monthly</span>
            <h2 id="monthlyEarn">$0.00</h2>
          </div>
          <div class="card yearly">
            <span>Yearly</span>
            <h2 id="yearlyEarn">$0.00</h2>
          </div>
        </div>

        <!-- Dynamic Chart -->
        <div class="chart-container">
          <canvas id="revenueChart"></canvas>
        </div>

      </div>
    </div>
  </div>

  <script>
    // DOM Elements
    const pageViewsSlider = document.getElementById('pageViews');
    const pageViewsInput = document.getElementById('pageViewsInput');
    const ctrSlider = document.getElementById('ctr');
    const ctrInput = document.getElementById('ctrInput');
    const cpcSlider = document.getElementById('cpc');
    const cpcInput = document.getElementById('cpcInput');

    const dailyEarnEl = document.getElementById('dailyEarn');
    const monthlyEarnEl = document.getElementById('monthlyEarn');
    const yearlyEarnEl = document.getElementById('yearlyEarn');
    const dailyClicksEl = document.getElementById('dailyClicks');
    const ecpmEl = document.getElementById('ecpm');

    // Chart.js Setup
    const ctx = document.getElementById('revenueChart').getContext('2d');
    const revenueChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Daily Earnings', 'Monthly Earnings', 'Yearly Earnings'],
        datasets: [{
          data: [0, 0, 0],
          backgroundColor: ['#3b82f6', '#8b5cf6', '#ec4899'],
          borderWidth: 0,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              boxWidth: 12,
              font: {
                family: "'Plus Jakarta Sans', sans-serif",
                weight: '600',
                size: 11
              }
            }
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                return ` ${context.label}: $${context.raw.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
              }
            }
          }
        },
        cutout: '70%'
      }
    });

    // Sync Slider & Input fields
    function syncInputs(slider, input) {
      slider.addEventListener('input', () => {
        input.value = slider.value;
        calculateRevenue();
      });

      input.addEventListener('input', () => {
        let val = parseFloat(input.value) || 0;
        slider.value = val;
        calculateRevenue();
      });
    }

    syncInputs(pageViewsSlider, pageViewsInput);
    syncInputs(ctrSlider, ctrInput);
    syncInputs(cpcSlider, cpcInput);

    // Formatter
    const formatCurrency = (amount) => {
      return '$' + amount.toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    };

    // Main Calculation Function
    function calculateRevenue() {
      const views = parseFloat(pageViewsSlider.value) || 0;
      const ctr = parseFloat(ctrSlider.value) || 0;
      const cpc = parseFloat(cpcSlider.value) || 0;

      // Calculations
      const clicks = views * (ctr / 100);
      const dailyRevenue = clicks * cpc;
      const monthlyRevenue = dailyRevenue * 30;
      const yearlyRevenue = dailyRevenue * 365;
      const ecpm = views > 0 ? (dailyRevenue / views) * 1000 : 0;

      // Update UI Text
      dailyClicksEl.textContent = Math.round(clicks).toLocaleString();
      ecpmEl.textContent = formatCurrency(ecpm);
      dailyEarnEl.textContent = formatCurrency(dailyRevenue);
      monthlyEarnEl.textContent = formatCurrency(monthlyRevenue);
      yearlyEarnEl.textContent = formatCurrency(yearlyRevenue);

      // Update Chart
      revenueChart.data.datasets[0].data = [
        dailyRevenue.toFixed(2),
        monthlyRevenue.toFixed(2),
        yearlyRevenue.toFixed(2)
      ];
      revenueChart.update();
    }

    // Initial Calculation on Load
    calculateRevenue();
  </script>
</body>
</html>
